                  <line x1="40" y1="181.1" x2="40" y2="223.2"/>
                  <line x1="60" y1="181.1" x2="60" y2="223.2"/>
                  <line x1="80" y1="181.1" x2="80" y2="223.2"/>
                  <line x1="100" y1="181.1" x2="100" y2="223.2"/>
