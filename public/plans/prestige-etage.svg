            <svg id="f1" class="plan-svg" viewBox="-1 -1 502 322" xmlns="http://www.w3.org/2000/svg">

              <!-- BACKGROUND : Escalier + Balcon + Parking + Terrasse (accès RDC) -->
              <g id="f1-shell" pointer-events="none">

