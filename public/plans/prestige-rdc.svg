            <svg id="f0" class="plan-svg" viewBox="-1 -1 502 322" xmlns="http://www.w3.org/2000/svg">

              <!-- BACKGROUND : non-interactive zones (Toilets + Escalier + Parking) -->
              <!-- TOILETS (cliquable, top-left) -->
              <g class="pzone toilet" data-room='toilet'>
                <rect class="pz-fill" x="0" y="0" width="73" height="93"/>
                <text class="pz-text" x="37" y="49" text-anchor="middle" style="font-size:11px">Toilettes</text>
              </g>

              <g id="f0-shell" pointer-events="none">
                <!-- ESCALIER (under toilets) -->
                <polygon points="0,93 73,93 73,133 43,133 43,158 0,158"
                         fill="rgba(225,222,215,0.5)" stroke="none"/>
                <g transform="translate(27, 105)" pointer-events="none">
                  <path d="M 0 18 L 0 12 L 6 12 L 6 6 L 12 6 L 12 0 L 18 0"
                        stroke="rgba(120,115,108,0.65)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
                <!-- PARKING (bottom-left) -->
                <rect x="0" y="220" width="143" height="100"
                      fill="rgba(225,222,215,0.5)" stroke="rgba(61,57,52,0.95)" stroke-width="1"/>
                <text x="71.5" y="275" text-anchor="middle"
                      font-family="'the-seasons', Georgia, serif" font-size="13"
                      font-weight="500" letter-spacing="0.04em"
                      fill="rgba(52,48,44,0.85)">Parking</text>

              </g>

              <!-- WALLS (rendered BEFORE pzones so hover-gold polygon strokes render on top) -->
              <g pointer-events="none" fill="none">
                <path d="M 73 0 L 500 0 L 500 158 L 143 158 L 143 220 L 0 220 L 0 93 M 0 158 L 43 158 L 43 133 L 73 133 L 73 0"
                      stroke="rgba(61,57,52,0.95)" stroke-width="1"/>
              </g>

              <!-- TERRACE (cliquable en entier) -->
              <g class="pzone terrace" data-room='terrace'>
                <rect class="pz-fill" x="143" y="158" width="357" height="162" style="stroke:none"/>
                <text class="pz-text" x="190" y="180" text-anchor="start">Terrasse</text>
              </g>

              <!-- Terrace decorative deck lines (interrupted by pool x=222→419, y=201→320) -->
              <g pointer-events="none" fill="none" stroke="rgba(61,57,52,0.25)" stroke-width="0.5">
                <!-- Lignes complètes dans la bande haute (au-dessus de la piscine, y=158 à 201) -->
                <line x1="143" y1="178" x2="500" y2="178"/>
                <line x1="143" y1="192" x2="500" y2="192"/>
                <!-- Lignes interrompues à hauteur de la piscine -->
                <line x1="143" y1="220" x2="222" y2="220"/>
                <line x1="419" y1="220" x2="500" y2="220"/>
                <line x1="143" y1="240" x2="222" y2="240"/>
                <line x1="419" y1="240" x2="500" y2="240"/>
                <line x1="143" y1="260" x2="222" y2="260"/>
                <line x1="419" y1="260" x2="500" y2="260"/>
                <line x1="143" y1="280" x2="222" y2="280"/>
                <line x1="419" y1="280" x2="500" y2="280"/>
                <line x1="143" y1="300" x2="222" y2="300"/>
                <line x1="419" y1="300" x2="500" y2="300"/>
              </g>

              <!-- Terrace right + bottom borders -->
              <g pointer-events="none" fill="none">
                <path d="M 143 320 L 500 320 L 500 158" stroke="rgba(61,57,52,0.95)" stroke-width="1"/>
              </g>

              <!-- PISCINE (decorative, non-clickable, inside terrace) -->
              <g pointer-events="none">
                <rect x="222" y="201" width="197" height="119"
                      fill="rgba(178,210,225,0.55)" stroke="rgba(95,135,160,0.85)" stroke-width="1"/>
                <path d="M 240 240 Q 250 236 260 240 Q 270 244 280 240 Q 290 236 300 240 Q 310 244 320 240 Q 330 236 340 240 Q 350 244 360 240 Q 370 236 380 240 Q 390 244 400 240"
                      fill="none" stroke="rgba(95,135,160,0.6)" stroke-width="0.8"/>
                <path d="M 240 254 Q 250 250 260 254 Q 270 258 280 254 Q 290 250 300 254 Q 310 258 320 254 Q 330 250 340 254 Q 350 258 360 254 Q 370 250 380 254 Q 390 258 400 254"
                      fill="none" stroke="rgba(95,135,160,0.6)" stroke-width="0.8"/>
                <text x="320.5" y="295" text-anchor="middle"
                      font-family="'the-seasons', Georgia, serif" font-size="13"
                      letter-spacing="0.04em"
                      fill="rgba(50,80,100,0.9)">Piscine</text>
              </g>

              <!-- CUISINE (steps around Bureau L-upper at x=73→143, y=133→158) -->
              <g class="pzone kitchen" data-room='kitchen'>
                <polygon class="pz-fill" points="73,0 217,0 217,158 143,158 143,133 73,133" style="stroke:none"/>
                <text class="pz-text" x="145.5" y="85" text-anchor="middle">Cuisine</text>
              </g>

              <!-- DINING (entre Cuisine et Living) -->
              <g class="pzone dining" data-room='dining'>
                <polygon class="pz-fill" points="217,0 358.5,0 358.5,158 217,158" style="stroke:none"/>
                <text class="pz-text" x="287.75" y="85" text-anchor="middle">Dining</text>
              </g>

              <!-- LIVING -->
              <g class="pzone living" data-room='living'>
                <polygon class="pz-fill" points="358.5,0 500,0 500,158 358.5,158" style="stroke:none"/>
                <text class="pz-text" x="429.25" y="85" text-anchor="middle">Living</text>
              </g>

              <!-- WORKSPACE -->
              <g class="pzone workspace" data-room='workspace'>
                <polygon class="pz-fill" points="43,133 143,133 143,220 0,220 0,158 43,158" style="stroke:none"/>
                <text class="pz-text" x="93" y="190" text-anchor="middle">Bureau</text>
              </g>

              <!-- DASHED SEPARATORS (on top, indicate open-plan) -->
              <g pointer-events="none" fill="none">
                <line x1="217" y1="0" x2="217" y2="158"
                      stroke="rgba(61,57,52,0.55)" stroke-width="1" stroke-dasharray="4 3"/>
                <line x1="358.5" y1="0" x2="358.5" y2="158"
                      stroke="rgba(61,57,52,0.55)" stroke-width="1" stroke-dasharray="4 3"/>
                <line x1="73" y1="133" x2="143" y2="133"
                      stroke="rgba(61,57,52,0.55)" stroke-width="1" stroke-dasharray="4 3"/>
                <line x1="143" y1="133" x2="143" y2="158"
                      stroke="rgba(61,57,52,0.55)" stroke-width="1" stroke-dasharray="4 3"/>
              </g>

            </svg>
